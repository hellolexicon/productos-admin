<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Portal</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:        #ffffff;
      --surface:   #f9f9f9;
      --border:    #e8e8e8;
      --text:      #111111;
      --text-2:    #555555;
      --text-3:    #999999;
      --accent:    #0066cc;
      --accent-bg: rgba(0, 102, 204, 0.08);
      --radius:    10px;
      --max-w:     700px;
    }
    body {
      font: 15px/1.6 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg); color: var(--text);
      -webkit-font-smoothing: antialiased;
    }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }

    /* ---- Header ---- */
    .portal-header {
      position: sticky; top: 0; z-index: 50;
      background: rgba(255,255,255,0.9); backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
    }
    .portal-header-inner {
      max-width: var(--max-w); margin: 0 auto;
      display: flex; align-items: center; gap: 20px;
      height: 56px;
    }
    .portal-brand {
      font-weight: 700; font-size: 16px; letter-spacing: -0.02em;
      color: var(--text); flex-shrink: 0;
    }
    .portal-nav {
      display: flex; gap: 2px; margin-left: auto;
    }
    .portal-nav button {
      background: none; border: none; cursor: pointer;
      font: 14px -apple-system, BlinkMacSystemFont, sans-serif;
      font-weight: 500;
      color: var(--text-2); padding: 6px 12px;
      border-radius: 8px; transition: background 0.15s, color 0.15s;
    }
    .portal-nav button:hover { background: var(--surface); color: var(--text); }
    .portal-nav button.active { background: var(--accent-bg); color: var(--accent); }

    /* ---- Layout ---- */
    .portal-body { max-width: var(--max-w); margin: 0 auto; padding: 40px 24px 80px; }

    /* ---- Panel ---- */
    .panel { display: none; }
    .panel.active { display: block; }

    /* ---- Changelog ---- */
    .cl-meta { font-size: 13px; color: var(--text-3); margin-bottom: 32px; }
    .cl-entry { padding: 32px 0; border-bottom: 1px solid var(--border); }
    .cl-entry:first-child { padding-top: 0; }
    .cl-entry:last-child { border-bottom: none; }
    .cl-tags { display: flex; gap: 6px; margin-bottom: 10px; flex-wrap: wrap; }
    .cl-tag {
      font-size: 10px; font-weight: 700; text-transform: uppercase;
      letter-spacing: .06em; padding: 2px 8px; border-radius: 999px;
    }
    .cl-tag.new      { color: #1a9a3a; background: rgba(26,154,58,.12); }
    .cl-tag.improved { color: #005fcc; background: rgba(0,95,204,.10); }
    .cl-tag.fixed    { color: #b85c00; background: rgba(184,92,0,.10); }
    .cl-title {
      font-size: 21px; font-weight: 700; letter-spacing: -.025em;
      color: var(--text); margin-bottom: 8px; line-height: 1.25;
    }
    .cl-date { font-size: 13px; color: var(--text-3); margin-bottom: 12px; }
    .cl-excerpt { font-size: 14px; color: var(--text-2); line-height: 1.6; }
    .cl-excerpt p { margin-bottom: 8px; }
    .cl-excerpt p:last-child { margin-bottom: 0; }

    /* ---- Roadmap ---- */
    .rm-section { margin-bottom: 36px; }
    .rm-section-title {
      font-size: 11px; font-weight: 700; text-transform: uppercase;
      letter-spacing: .07em; color: var(--text-3); margin-bottom: 10px;
    }
    .rm-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); overflow: hidden;
    }
    .rm-row {
      padding: 14px 18px; position: relative;
      transition: background .15s;
    }
    .rm-row + .rm-row { border-top: 1px solid var(--border); }
    .rm-row:hover { background: #f0f0f0; }
    .rm-row-head { display: flex; align-items: center; gap: 10px; }
    .rm-title { font-weight: 500; font-size: 14.5px; }
    .rm-status {
      margin-left: auto; flex-shrink: 0;
      font-size: 11px; font-weight: 600; text-transform: uppercase;
      letter-spacing: .05em; padding: 2px 8px; border-radius: 999px;
    }
    .rm-status.now   { color: #1a9a3a; background: rgba(26,154,58,.12); }
    .rm-status.next  { color: #005fcc; background: rgba(0,95,204,.10); }
    .rm-status.later { color: var(--text-3); background: var(--border); }
    .rm-desc { font-size: 13px; color: var(--text-3); margin-top: 4px; line-height: 1.5; }
    .rm-chips { display: flex; gap: 6px; margin-top: 8px; flex-wrap: wrap; }
    .rm-chip {
      font-size: 11px; color: var(--text-3); background: var(--border);
      padding: 1px 8px; border-radius: 5px;
    }
    .rm-target { font-size: 12px; color: var(--text-3); margin-top: 4px; }

    /* ---- Requests page ---- */
    .rq-header {
      display: flex; align-items: flex-start; justify-content: space-between;
      gap: 16px; margin-bottom: 10px;
    }
    .rq-header-text h1 {
      font-size: 34px; font-weight: 800; letter-spacing: -.04em; line-height: 1.1;
      margin-bottom: 6px;
    }
    .rq-header-text p { font-size: 14px; color: var(--text-2); }
    .rq-actions { display: flex; gap: 8px; align-items: center; flex-shrink: 0; padding-top: 6px; }
    .rq-icon-btn {
      width: 36px; height: 36px; border: 1px solid var(--border);
      border-radius: 8px; background: var(--bg); cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      color: var(--text-2); transition: background .12s, color .12s;
    }
    .rq-icon-btn:hover { background: var(--surface); color: var(--text); }
    .rq-new-btn {
      display: flex; align-items: center; gap: 7px; height: 36px;
      padding: 0 14px; border: 1px solid var(--border); border-radius: 8px;
      background: var(--bg); color: var(--text); white-space: nowrap;
      font: 600 13.5px -apple-system, sans-serif; cursor: pointer;
      transition: background .12s;
    }
    .rq-new-btn:hover { background: var(--surface); }
    .rq-search-bar { margin: 16px 0 20px; display: none; }
    .rq-search-bar.open { display: block; }
    .rq-search-input {
      width: 100%; font: 14px -apple-system, sans-serif; color: var(--text);
      padding: 9px 12px; border: 1px solid var(--border); border-radius: 8px;
      background: var(--bg);
    }
    .rq-search-input:focus { outline: 2px solid var(--accent); outline-offset: 1px; }
    /* Status groups */
    .rq-group { margin-bottom: 6px; }
    .rq-group-header {
      display: flex; align-items: center; gap: 10px;
      padding: 9px 12px; border-radius: 8px; background: var(--surface);
      font-size: 13px; font-weight: 600; margin-bottom: 2px;
    }
    /* Project rows */
    .rq-project {
      display: flex; align-items: center; gap: 12px;
      padding: 10px 12px; border-radius: 8px; transition: background .12s;
    }
    .rq-project:hover { background: var(--surface); }
    .rq-proj-icon {
      width: 30px; height: 30px; border-radius: 7px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 700;
    }
    .rq-proj-body { flex: 1; min-width: 0; }
    .rq-proj-name { font-size: 14px; font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .rq-proj-sub  { font-size: 12.5px; color: var(--text-2); margin-top: 1px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .rq-vote {
      display: flex; flex-direction: column; align-items: center; gap: 2px;
      min-width: 40px; padding: 5px 8px;
      border: 1px solid var(--border); border-radius: 8px; flex-shrink: 0;
      color: var(--text-2); font-family: -apple-system, sans-serif;
    }
    .rq-vote-count { font-size: 13px; font-weight: 700; line-height: 1; }
    .rq-empty { padding: 48px 12px; text-align: center; color: var(--text-3); font-size: 14px; }
    /* New request modal */
    .rq-modal-bg {
      display: none; position: fixed; inset: 0; z-index: 200;
      background: rgba(0,0,0,.35); backdrop-filter: blur(4px);
      align-items: center; justify-content: center; padding: 20px;
    }
    .rq-modal-bg.open { display: flex; }
    .rq-modal {
      background: var(--bg); border: 1px solid var(--border);
      border-radius: 14px; padding: 24px; width: 100%; max-width: 440px;
      box-shadow: 0 20px 60px rgba(0,0,0,.15);
    }
    .rq-modal-title { font-size: 17px; font-weight: 700; margin-bottom: 18px; }
    .fb-field { margin-bottom: 12px; }
    .fb-field label { display: block; font-size: 12px; font-weight: 600; color: var(--text-2); margin-bottom: 4px; }
    .fb-field input, .fb-field textarea {
      width: 100%; font: 14px -apple-system, sans-serif; color: var(--text);
      padding: 8px 10px; border: 1px solid var(--border); border-radius: 7px;
      background: var(--bg); resize: vertical;
    }
    .fb-field textarea { min-height: 80px; }
    .fb-field input:focus, .fb-field textarea:focus { outline: 2px solid var(--accent); outline-offset: 1px; }
    .rq-modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; }
    .rq-cancel-btn {
      background: none; border: 1px solid var(--border);
      font: 500 14px -apple-system, sans-serif;
      padding: 7px 14px; border-radius: 7px; cursor: pointer; color: var(--text-2);
      transition: background .12s;
    }
    .rq-cancel-btn:hover { background: var(--surface); }
    .rq-submit-btn {
      background: var(--accent); color: #fff; border: none;
      font: 600 14px -apple-system, sans-serif;
      padding: 7px 16px; border-radius: 7px; cursor: pointer; transition: opacity .12s;
    }
    .rq-submit-btn:hover { opacity: .88; }
    .rq-submit-btn:disabled { opacity: .5; cursor: default; }

    /* ---- Status pills (shared) ---- */
    .status-pill {
      font-size: 11px; font-weight: 600; text-transform: uppercase;
      letter-spacing: .05em; padding: 2px 8px; border-radius: 999px; white-space: nowrap;
    }
    [data-status="In Progress"], [data-status="started"] { color: #1a9a3a; background: rgba(26,154,58,.12); }
    [data-status="Planned"], [data-status="planned"]     { color: #005fcc; background: rgba(0,95,204,.10); }
    [data-status="Backlog"], [data-status="backlog"]     { color: var(--text-3); background: var(--border); }

    /* ---- Empty / loading ---- */
    .empty { padding: 48px 20px; text-align: center; color: var(--text-3); font-size: 14px; }
    .skeleton {
      display: inline-block; height: 14px; border-radius: 4px;
      background: linear-gradient(90deg, var(--surface), #ececec, var(--surface));
      background-size: 200% 100%; animation: sk 1.4s ease-in-out infinite;
    }
    @keyframes sk { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

    /* ---- Disabled overlay ---- */
    #portal-disabled {
      display: none; position: fixed; inset: 0; background: var(--bg);
      flex-direction: column; align-items: center; justify-content: center;
      gap: 12px; text-align: center; padding: 40px;
    }
    #portal-disabled.show { display: flex; }
    #portal-disabled h2 { font-size: 22px; font-weight: 700; }
    #portal-disabled p  { font-size: 15px; color: var(--text-2); }

    /* ---- Toast ---- */
    #toast {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(16px);
      background: var(--text); color: #fff; border-radius: 8px;
      font-size: 13px; font-weight: 500; padding: 10px 18px;
      opacity: 0; transition: opacity .2s, transform .2s; pointer-events: none;
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    #toast.error { background: #c0392b; }

    @media (max-width: 600px) {
      .portal-header-inner { gap: 12px; }
      .portal-nav button { padding: 6px 9px; font-size: 13px; }
    }
  </style>
</head>
<body>

<div id="portal-disabled">
  <h2 id="portal-disabled-name">Product Portal</h2>
  <p>The customer portal is not yet enabled.</p>
</div>

<header class="portal-header">
  <div class="portal-header-inner">
    <span class="portal-brand" id="portal-brand">Portal</span>
    <nav class="portal-nav">
      <button class="active" data-tab="changelog" onclick="switchTab('changelog')">Changelog</button>
      <button data-tab="roadmap" onclick="switchTab('roadmap')">Roadmap</button>
      <button data-tab="feedback" onclick="switchTab('feedback')">Requests</button>
    </nav>
  </div>
</header>

<div class="portal-body">
  <!-- Changelog -->
  <div class="panel active" id="panel-changelog">
    <p class="cl-meta" id="cl-meta"></p>
    <div id="cl-list"><div class="empty"><span class="skeleton" style="width:220px"></span></div></div>
  </div>

  <!-- Roadmap -->
  <div class="panel" id="panel-roadmap">
    <div id="rm-list"><div class="empty"><span class="skeleton" style="width:240px"></span></div></div>
  </div>

  <!-- Requests -->
  <div class="panel" id="panel-feedback">
    <div class="rq-header">
      <div class="rq-header-text">
        <h1>Requests</h1>
        <p id="fb-headline"></p>
      </div>
      <div class="rq-actions">
        <button class="rq-icon-btn" onclick="toggleRqSearch()" title="Search">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <circle cx="7" cy="7" r="4.5" stroke="currentColor" stroke-width="1.5"/>
            <path d="M10.5 10.5L13.5 13.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </button>
        <button class="rq-new-btn" onclick="openRqModal()">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
            <path d="M6.5 2.5H3a1 1 0 0 0-1 1v7a1 1 0 0 0 1 1h7a1 1 0 0 0 1-1V7" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
            <path d="M9 1.5l3 3-4.5 4.5H5V6.5L9 2z" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round"/>
          </svg>
          New request
        </button>
      </div>
    </div>
    <div class="rq-search-bar" id="rq-search-bar">
      <input class="rq-search-input" id="rq-search" type="text" placeholder="Search requests…" oninput="renderRqProjects()">
    </div>
    <div id="rq-list">
      <div class="empty"><span class="skeleton" style="width:220px"></span></div>
    </div>
  </div>
</div>

<!-- New request modal -->
<div class="rq-modal-bg" id="rq-modal-bg" onclick="if(event.target===this)closeRqModal()">
  <div class="rq-modal">
    <div class="rq-modal-title">New request</div>
    <div class="fb-field">
      <label>Your feedback <span style="color:#c00">*</span></label>
      <textarea id="fb-body" placeholder="Describe what you'd like to see…"></textarea>
    </div>
    <div class="fb-field" id="fb-project-field" style="display:none">
      <label>Related project <span style="font-weight:400;color:var(--text-3)">(optional)</span></label>
      <select id="fb-project" style="width:100%;padding:8px 10px;border:1px solid var(--border);border-radius:8px;font:14px -apple-system,sans-serif;background:var(--bg);color:var(--text)">
        <option value="">— General feedback —</option>
      </select>
    </div>
    <div class="fb-field">
      <label>Name <span style="font-weight:400;color:var(--text-3)">(optional)</span></label>
      <input id="fb-name" type="text" placeholder="Your name">
    </div>
    <div class="fb-field">
      <label>Email <span style="font-weight:400;color:var(--text-3)">(optional)</span></label>
      <input id="fb-email" type="email" placeholder="you@company.com">
    </div>
    <div class="rq-modal-actions">
      <button class="rq-cancel-btn" onclick="closeRqModal()">Cancel</button>
      <button class="rq-submit-btn" id="fb-send-btn" onclick="submitFeedback()">Submit</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
  // ---------- Config ----------
  const BASE = (() => {
    const p = location.pathname;
    const idx = p.indexOf('/portal.html');
    return idx !== -1 ? p.slice(0, idx) : p.replace(/\/?$/, '');
  })();

  let TENANT = { productName: 'Portal', tagline: '', repo: '' };
  let PORTAL  = { enabled: false, headline: 'Follow along as we build', visibleProjectIds: [],
                  feedbackEndpoint: '', linearFeedback: false, portalTriggerToken: '', feedbackProjectId: '' };

  async function boot() {
    await Promise.all([
      fetch(`${BASE}/config.json?t=${Date.now()}`, { cache: 'no-store' })
        .then(r => r.ok ? r.json() : {}).then(d => Object.assign(TENANT, d)).catch(() => {}),
      fetch(`${BASE}/portal-config.json?t=${Date.now()}`, { cache: 'no-store' })
        .then(r => r.ok ? r.json() : {}).then(d => Object.assign(PORTAL, d)).catch(() => {}),
    ]);

    document.getElementById('portal-brand').textContent = TENANT.productName;
    document.getElementById('portal-disabled-name').textContent = TENANT.productName;
    document.title = TENANT.productName + ' — Portal';

    if (!PORTAL.enabled) {
      document.getElementById('portal-disabled').classList.add('show');
      return;
    }

    document.getElementById('fb-headline').textContent = PORTAL.headline;

    // Show project selector in modal when Linear direct mode is on
    if (PORTAL.linearFeedback) {
      document.getElementById('fb-project-field').style.display = '';
    }

    const tab = new URLSearchParams(location.search).get('tab') || 'changelog';
    switchTab(tab);
  }

  // ---------- Tabs ----------
  function switchTab(id) {
    document.querySelectorAll('[data-tab]').forEach(b =>
      b.classList.toggle('active', b.dataset.tab === id));
    document.querySelectorAll('.panel').forEach(p =>
      p.classList.toggle('active', p.id === `panel-${id}`));
    history.replaceState(null, '', `${BASE}/portal.html?tab=${id}`);
    if (id === 'changelog') loadChangelog();
    if (id === 'roadmap')   loadRoadmap();
    if (id === 'feedback')  loadFeedback();
  }

  // ---------- Changelog ----------
  let _cl; let _clLoading = false;
  async function loadChangelog() {
    if (_cl || _clLoading) return;
    _clLoading = true;
    const list = document.getElementById('cl-list');
    const meta = document.getElementById('cl-meta');
    try {
      const r = await fetch(`${BASE}/changelog.json?t=${Date.now()}`, { cache: 'no-store' });
      if (!r.ok) throw new Error(r.status);
      _cl = await r.json();
      const published = (_cl.entries || []).filter(e => e.status === 'published');
      meta.textContent = `${published.length} update${published.length === 1 ? '' : 's'}`;
      if (!published.length) { list.innerHTML = '<div class="empty">No updates yet.</div>'; return; }
      list.innerHTML = published.map(e => {
        const date = e.date ? new Date(e.date).toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' }) : '';
        const tags = (e.tags || []).map(t =>
          `<span class="cl-tag ${t.toLowerCase()}">${esc(t)}</span>`).join('');
        const cover = e.coverImage
          ? `<img src="${esc(resolveImg(e.coverImage))}" style="width:100%;border-radius:8px;margin-bottom:16px;display:block" loading="lazy" alt="">`
          : '';
        const excerpt = plainText(e.body || '').slice(0, 280).trimEnd();
        return `<div class="cl-entry">
          ${tags ? `<div class="cl-tags">${tags}</div>` : ''}
          <div class="cl-title">${esc(e.title || '(untitled)')}</div>
          ${date ? `<div class="cl-date">${date}</div>` : ''}
          ${cover}
          ${excerpt ? `<div class="cl-excerpt"><p>${esc(excerpt)}${e.body && e.body.length > 280 ? '…' : ''}</p></div>` : ''}
        </div>`;
      }).join('');
    } catch { list.innerHTML = '<div class="empty">Changelog unavailable.</div>'; }
    finally { _clLoading = false; }
  }

  function resolveImg(src) {
    if (!src) return src;
    if (src.startsWith('http')) return src;
    if (src.startsWith('changelog-images/')) return `${BASE}/${src}`;
    return src;
  }

  function plainText(md) {
    return md
      .replace(/^#{1,6}\s+/gm, '')
      .replace(/!\[.*?\]\(.*?\)/g, '')
      .replace(/\[([^\]]+)\]\([^)]+\)/g, '$1')
      .replace(/[*_`~]/g, '')
      .replace(/^[-*+]\s+/gm, '')
      .replace(/^>\s+/gm, '')
      .replace(/\n{2,}/g, ' ')
      .replace(/\n/g, ' ')
      .trim();
  }

  // ---------- Roadmap ----------
  let _rm; let _rmLoading = false;
  async function loadRoadmap() {
    if (_rm || _rmLoading) return;
    _rmLoading = true;
    const list = document.getElementById('rm-list');
    try {
      const r = await fetch(`${BASE}/roadmap.json?t=${Date.now()}`, { cache: 'no-store' });
      if (!r.ok) throw new Error(r.status);
      _rm = await r.json();
      const visible = PORTAL.visibleProjectIds || [];
      const rmProjects = visible.length
        ? (_rm.projects || []).filter(p => visible.includes(p.linearId))
        : (_rm.projects || []);
      renderRoadmap(rmProjects);
    } catch { list.innerHTML = '<div class="empty">Roadmap unavailable.</div>'; }
    finally { _rmLoading = false; }
  }

  function renderRoadmap(projects) {
    const list = document.getElementById('rm-list');
    if (!projects.length) { list.innerHTML = '<div class="empty">Nothing on the roadmap yet.</div>'; return; }
    const buckets = { now: [], next: [], later: [] };
    for (const p of projects) {
      const s = (p.status || p.statusName || '').toLowerCase();
      if (s === 'started' || s === 'in progress') buckets.now.push(p);
      else if (s === 'planned') buckets.next.push(p);
      else buckets.later.push(p);
    }
    const LABELS = { now: 'In Progress', next: 'Planned', later: 'Up next' };
    list.innerHTML = Object.entries(buckets)
      .filter(([, items]) => items.length)
      .map(([key, items]) => `
        <div class="rm-section">
          <div class="rm-section-title">${LABELS[key]}</div>
          <div class="rm-card">${items.map(p => rmRow(p, key)).join('')}</div>
        </div>
      `).join('');
  }

  function rmRow(p, key) {
    const chips = [...(p.teams || []), ...(p.initiatives || [])]
      .map(c => `<span class="rm-chip">${esc(c)}</span>`).join('');
    const target = p.targetDate
      ? `<div class="rm-target">Target: ${new Date(p.targetDate).toLocaleDateString('en-US', { month: 'short', year: 'numeric' })}</div>`
      : '';
    const desc = p.description ? `<div class="rm-desc">${esc(truncate(p.description, 140))}</div>` : '';
    return `<div class="rm-row">
      <div class="rm-row-head">
        <span class="rm-title">${esc(p.title || '(untitled)')}</span>
        <span class="rm-status ${key}">${['now','next','later'].includes(key) ? {now:'In Progress',next:'Planned',later:'Up next'}[key] : esc(p.status)}</span>
      </div>
      ${desc}${chips ? `<div class="rm-chips">${chips}</div>` : ''}${target}
    </div>`;
  }

  // ---------- Requests ----------
  let _req; let _reqLoading = false;
  async function loadFeedback() {
    if (_req || _reqLoading) return;
    _reqLoading = true;
    try {
      const r = await fetch(`${BASE}/requests.json?t=${Date.now()}`, { cache: 'no-store' });
      if (!r.ok) throw new Error(r.status);
      _req = await r.json();
      renderRqProjects();
      populateProjectSelector();
    } catch { document.getElementById('rq-list').innerHTML = '<div class="rq-empty">Could not load requests.</div>'; }
    finally { _reqLoading = false; }
  }

  function populateProjectSelector() {
    if (!PORTAL.linearFeedback || !_req) return;
    const sel = document.getElementById('fb-project');
    const visible = PORTAL.visibleProjectIds || [];
    const projects = visible.length
      ? (_req.projects || []).filter(p => visible.includes(p.id))
      : (_req.projects || []);
    // Rebuild options (keep the "General feedback" placeholder)
    sel.innerHTML = '<option value="">— General feedback —</option>';
    for (const p of projects) {
      const opt = document.createElement('option');
      opt.value = p.id;
      opt.textContent = p.name;
      sel.appendChild(opt);
    }
    // Pre-select configured default
    if (PORTAL.feedbackProjectId) sel.value = PORTAL.feedbackProjectId;
  }

  const RQ_META = {
    'solution delivery':     { order:0, color:'#6366f1', bg:'rgba(99,102,241,.12)',  icon:'delivery'  },
    'in progress':           { order:0, color:'#6366f1', bg:'rgba(99,102,241,.12)',  icon:'delivery'  },
    'started':               { order:0, color:'#6366f1', bg:'rgba(99,102,241,.12)',  icon:'delivery'  },
    'opportunity discovery': { order:1, color:'#8b5cf6', bg:'rgba(139,92,246,.12)', icon:'discovery' },
    'discovery':             { order:1, color:'#8b5cf6', bg:'rgba(139,92,246,.12)', icon:'discovery' },
    'planned':               { order:2, color:'#0ea5e9', bg:'rgba(14,165,233,.12)',  icon:'planned'   },
    'backlog':               { order:3, color:'#94a3b8', bg:'rgba(148,163,184,.12)','icon':'backlog'  },
    'done':                  { order:4, color:'#6b7280', bg:'rgba(107,114,128,.10)', icon:'done'      },
    'shipped':               { order:4, color:'#6b7280', bg:'rgba(107,114,128,.10)', icon:'done'      },
    'impact assessed':       { order:4, color:'#6b7280', bg:'rgba(107,114,128,.10)', icon:'done'      },
    'cancelled':             { order:5, color:'#ef4444', bg:'rgba(239,68,68,.10)',   icon:'cancelled' },
  };
  const RQ_ICONS = {
    delivery:  '<svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M8 2L13 4.5V9.5C13 12.5 8 14 8 14S3 12.5 3 9.5V4.5Z" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/></svg>',
    discovery: '<svg width="16" height="16" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="5.5" stroke="currentColor" stroke-width="1.4" stroke-dasharray="2.5 2"/></svg>',
    planned:   '<svg width="16" height="16" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="5.5" stroke="currentColor" stroke-width="1.4"/><circle cx="8" cy="8" r="2" fill="currentColor"/></svg>',
    backlog:   '<svg width="16" height="16" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="5.5" stroke="currentColor" stroke-width="1.4" stroke-dasharray="1.5 2.5"/></svg>',
    done:      '<svg width="16" height="16" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="5.5" stroke="currentColor" stroke-width="1.4"/><path d="M5.5 8L7 9.5L10.5 6" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>',
    cancelled: '<svg width="16" height="16" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="5.5" stroke="currentColor" stroke-width="1.4"/><path d="M6 6L10 10M10 6L6 10" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>',
  };
  const VOTE_SVG = '<svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M6 9.5V2.5M6 2.5L3 5.5M6 2.5L9 5.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>';

  function rqMeta(status) {
    return RQ_META[(status || '').toLowerCase()] ||
      { order:9, color:'#6366f1', bg:'rgba(99,102,241,.12)', icon:'delivery' };
  }

  function renderRqProjects() {
    const list = document.getElementById('rq-list');
    if (!_req) return;
    const visible = PORTAL.visibleProjectIds || [];
    let projects = visible.length
      ? (_req.projects || []).filter(p => visible.includes(p.id))
      : (_req.projects || []);
    const q = (document.getElementById('rq-search')?.value || '').toLowerCase().trim();
    if (q) projects = projects.filter(p => (p.name || '').toLowerCase().includes(q));
    if (!projects.length) {
      list.innerHTML = `<div class="rq-empty">${q ? 'No results.' : 'No requests yet.'}</div>`;
      return;
    }
    // Group by status
    const groups = new Map();
    for (const p of projects) {
      const meta = rqMeta(p.statusName || p.status);
      const label = (p.statusName || p.status || 'Other');
      if (!groups.has(label)) groups.set(label, { meta, label, projects: [] });
      groups.get(label).projects.push(p);
    }
    const sorted = [...groups.values()].sort((a, b) => a.meta.order - b.meta.order);
    for (const g of sorted) g.projects.sort((a, b) => (b.requestCount||0) - (a.requestCount||0));

    list.innerHTML = sorted.map(({ meta, label, projects: ps }) => `
      <div class="rq-group">
        <div class="rq-group-header" style="color:${meta.color}">
          ${RQ_ICONS[meta.icon] || RQ_ICONS.delivery}
          ${esc(label)}
        </div>
        ${ps.map(p => {
          const initial = (p.name || '?')[0].toUpperCase();
          const sub = p.requests?.[0]?.body ? truncate(p.requests[0].body, 90) : '';
          const cnt = p.requestCount || 0;
          return `<div class="rq-project">
            <div class="rq-proj-icon" style="background:${meta.bg};color:${meta.color}">${initial}</div>
            <div class="rq-proj-body">
              <div class="rq-proj-name">${esc(p.name)}</div>
              ${sub ? `<div class="rq-proj-sub">${esc(sub)}</div>` : ''}
            </div>
            <div class="rq-vote">
              ${VOTE_SVG}
              <span class="rq-vote-count">${cnt}</span>
            </div>
          </div>`;
        }).join('')}
      </div>`).join('');
  }

  // ---------- Search & modal ----------
  function toggleRqSearch() {
    const bar = document.getElementById('rq-search-bar');
    bar.classList.toggle('open');
    if (bar.classList.contains('open')) document.getElementById('rq-search').focus();
    else { document.getElementById('rq-search').value = ''; renderRqProjects(); }
  }
  async function openRqModal() {
    document.getElementById('rq-modal-bg').classList.add('open');
    setTimeout(() => document.getElementById('fb-body').focus(), 50);
    // Ensure the project selector is populated even if Requests tab wasn't visited yet
    if (PORTAL.linearFeedback && !_req) await loadFeedback();
  }
  function closeRqModal() { document.getElementById('rq-modal-bg').classList.remove('open'); }

  async function submitFeedback() {
    const body      = document.getElementById('fb-body').value.trim();
    const name      = document.getElementById('fb-name').value.trim();
    const email     = document.getElementById('fb-email').value.trim();
    const projectId = document.getElementById('fb-project')?.value || PORTAL.feedbackProjectId || '';
    if (!body) { toast('Please enter your feedback.', true); return; }

    const btn = document.getElementById('fb-send-btn');
    btn.disabled = true; btn.textContent = 'Sending…';

    try {
      if (PORTAL.linearFeedback && PORTAL.portalTriggerToken && TENANT.repo) {
        // Direct-to-Linear mode via GitHub Actions workflow_dispatch
        await submitToLinear({ body, name, email, projectId });
      } else if (PORTAL.feedbackEndpoint) {
        // Fallback: POST to webhook endpoint
        const r = await fetch(PORTAL.feedbackEndpoint, {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ body, name, email, product: TENANT.productName, source: location.href }),
        });
        if (!r.ok) throw new Error(`HTTP ${r.status}`);
      } else {
        toast('Feedback submission is not yet configured.', true);
        return;
      }
      closeRqModal();
      document.getElementById('fb-body').value  = '';
      document.getElementById('fb-name').value  = '';
      document.getElementById('fb-email').value = '';
      if (document.getElementById('fb-project')) document.getElementById('fb-project').value = PORTAL.feedbackProjectId || '';
      toast('Thank you for your feedback!');
    } catch (e) {
      console.error('submitFeedback error:', e);
      toast('Submission failed. Please try again.', true);
    } finally {
      btn.disabled = false; btn.textContent = 'Submit';
    }
  }

  async function submitToLinear({ body, name, email, projectId }) {
    const [owner, repoName] = TENANT.repo.split('/');
    if (!owner || !repoName) throw new Error('TENANT.repo not configured');
    const url = `https://api.github.com/repos/${owner}/${repoName}/actions/workflows/feedback.yml/dispatches`;
    const r = await fetch(url, {
      method: 'POST',
      headers: {
        'Authorization': `Bearer ${PORTAL.portalTriggerToken}`,
        'Accept':        'application/vnd.github+json',
        'Content-Type':  'application/json',
        'X-GitHub-Api-Version': '2022-11-28',
      },
      body: JSON.stringify({
        ref: 'main',
        inputs: { body, name: name || '', email: email || '', project_id: projectId || '' },
      }),
    });
    // 204 No Content = accepted; anything else is an error
    if (r.status !== 204) {
      const text = await r.text().catch(() => '');
      throw new Error(`GitHub API ${r.status}: ${text.slice(0, 120)}`);
    }
  }

  // ---------- Helpers ----------
  function esc(s) {
    return String(s || '').replace(/[&<>"']/g, c =>
      ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' })[c]);
  }
  function truncate(s, n) { return s.length <= n ? s : s.slice(0, n); }
  let _toastTimer;
  function toast(msg, err = false) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.classList.toggle('error', err);
    t.classList.add('show'); clearTimeout(_toastTimer);
    _toastTimer = setTimeout(() => t.classList.remove('show'), 3500);
  }

  boot();
</script>
</body>
</html>
